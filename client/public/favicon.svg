<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="qg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5EE7FF"/>
      <stop offset=".5" stop-color="#4D8DFF"/>
      <stop offset="1" stop-color="#7C6BFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="62%">
      <stop offset="0" stop-color="#5EE7FF" stop-opacity=".5"/>
      <stop offset="1" stop-color="#5EE7FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- 柔光底（深色背景下也有质感） -->
  <circle cx="32" cy="30" r="30" fill="url(#glow)"/>
  <!-- 六边形底（呼应七牛云立方体标识） -->
  <path d="M32 4 L55 17.5 V44.5 L32 58 L9 44.5 V17.5 Z" fill="url(#qg)"/>
  <path d="M32 4 L55 17.5 V44.5 L32 58 L9 44.5 V17.5 Z" fill="none" stroke="#ffffff" stroke-opacity=".22" stroke-width="1"/>
  <!-- 话筒即画笔：笔尖话筒 -->
  <rect x="26" y="15" width="12" height="21" rx="6" fill="#ffffff"/>
  <path d="M20.5 32 a11.5 11.5 0 0 0 23 0" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round"/>
  <line x1="32" y1="43.5" x2="32" y2="48" stroke="#ffffff" stroke-width="3.4" stroke-linecap="round"/>
  <!-- 笔触：从话筒用出的一笔 -->
  <path d="M32 48 C 40 48, 44 43, 49 37" fill="none" stroke="#BFF4FF" stroke-width="4" stroke-linecap="round"/>
  <!-- 声波 -->
  <path d="M44 20.5 a9 9 0 0 1 0 12" fill="none" stroke="#BFF4FF" stroke-width="3" stroke-linecap="round"/>
  <path d="M48.5 16.5 a14.5 14.5 0 0 1 0 20" fill="none" stroke="#BFF4FF" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
</svg>
